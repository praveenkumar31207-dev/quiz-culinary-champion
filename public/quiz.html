    --chalk: #f5f1e6;
    --chalk-dim: #d9d2bd;
    --chalk-yellow: #f5d76e;
    --chalk-green: #7ed957;
    --chalk-red: #ff6b6b;
    --board: #1f3a2e;
    --board-dark: #142720;
    --frame: #6b3f1d;
    --frame-dark: #3d240f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    font-family: 'Special Elite', 'Courier New', monospace;
    background:
      linear-gradient(rgba(10,5,2,0.72), rgba(10,5,2,0.85)),
      url('/quiz-bg.jpg') center center / cover no-repeat fixed,
      radial-gradient(ellipse at center, #2a1a0e 0%, #140a04 100%);
    color: var(--chalk);
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .frame {
    width: 100%;
    max-width: 640px;
    padding: 16px;
    border-radius: 14px;
    background:
      repeating-linear-gradient(45deg, var(--frame) 0 8px, var(--frame-dark) 8px 16px);
    box-shadow:
      0 20px 50px rgba(0,0,0,0.6),
      inset 0 0 0 3px #2a180a;
  }
  .board {
    position: relative;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(255,255,255,0.05), transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(255,255,255,0.04), transparent 60%),
      linear-gradient(180deg, var(--board) 0%, var(--board-dark) 100%);
    border-radius: 8px;
    padding: 28px 22px 22px;
    min-height: 520px;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.05);
    overflow: hidden;
  }
  .board::before {
    /* chalk dust */
    content: "";
    position: absolute; inset: 0;
    background-image:
      radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
      radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    mix-blend-mode: screen;
    pointer-events: none;
    opacity: 0.5;
  }
  .title {
    font-family: 'Shadows Into Light', cursive;
    font-size: clamp(36px, 8vw, 54px);
    color: var(--chalk-yellow);
    text-align: center;
    margin: 0 0 4px;
    letter-spacing: 1px;
    text-shadow: 0 0 1px rgba(255,255,255,0.4);
  }
  .subtitle {
    font-family: 'Caveat', cursive;
    text-align: center;
    color: var(--chalk-dim);
    font-size: 22px;
    margin: 0 0 22px;
  }
  .rule {
    border: none;
    border-top: 2px dashed rgba(245,241,230,0.25);
    margin: 14px 0 18px;
  }
  .description {
    font-size: 15px;
    line-height: 1.55;
    color: var(--chalk);
    text-align: center;
    margin: 0 auto 22px;
    max-width: 460px;
  }
  .btn {
    font-family: 'Shadows Into Light', cursive;
    background: transparent;
    color: var(--chalk-yellow);
    border: 2px solid var(--chalk-yellow);
    padding: 12px 26px;
    font-size: 24px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.15s ease, background 0.2s ease, color 0.2s ease;
  }
  .btn:hover { background: var(--chalk-yellow); color: #2a1a0e; transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .center { text-align: center; }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: var(--chalk-dim);
    margin-bottom: 10px;

  .category-chip {

    border-radius: 20px;
    transform: rotate(-2deg);

    margin: 6px 0 18px;

  .dot {

    background: transparent;
  }
  .dot.done { background: var(--chalk-yellow); border-color: var(--chalk-yellow); }
  .dot.correct { background: var(--chalk-green); border-color: var(--chalk-green); }
  .dot.wrong { background: var(--chalk-red); border-color: var(--chalk-red); }
  .dot.current { box-shadow: 0 0 0 3px rgba(245,215,110,0.3); }

  .question {
    font-family: 'Caveat', cursive;
    font-size: clamp(26px, 5.5vw, 34px);
    line-height: 1.25;
    color: var(--chalk);
    margin: 6px 0 18px;
    text-align: center;
  }
  .options {
    display: grid; gap: 10px;
  }
  .option {
    font-family: 'Special Elite', monospace;
    font-size: 16px;
    text-align: left;
    background: transparent;
    color: var(--chalk);
    border: 2px dashed rgba(245,241,230,0.4);
    border-radius: 8px;
    padding: 12px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .option:hover:not(:disabled) { border-color: var(--chalk-yellow); background: rgba(245,215,110,0.08); }
  .option:disabled { cursor: default; }
  .option .letter {
    display: inline-flex;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(245,241,230,0.15);
    align-items: center; justify-content: center;
    font-family: 'Shadows Into Light', cursive;
    font-size: 18px;
    flex-shrink: 0;

  .option.correct {
    border-color: var(--chalk-green);
    background: rgba(126,217,87,0.18);
    color: #d5ffb8;

  .option.wrong {
    border-color: var(--chalk-red);
    background: rgba(255,107,107,0.16);
    color: #ffd4d4;
    animation: shake 0.35s ease;
  }

  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }

    border-left: 4px solid var(--chalk-yellow);
    border-radius: 4px;
    font-family: 'Caveat', cursive;
    font-size: 20px;
    line-height: 1.35;
    color: var(--chalk);

    font-size: 22px;
    color: var(--chalk-yellow);

  .diff-blurb { font-family: 'Caveat', cursive; font-size: 16px; color: var(--chalk-dim); }

  .diff-count { font-size: 11px; letter-spacing: 1px; opacity: 0.7; text-transform: uppercase; }

  .category-chip.diff-easy { background: transparent; border: 2px solid var(--chalk-green); color: var(--chalk-green); }
  .category-chip.diff-medium { background: transparent; border: 2px solid var(--chalk-yellow); color: var(--chalk-yellow); }
  .category-chip.diff-hard { background: transparent; border: 2px solid var(--chalk-red); color: var(--chalk-red); }
  .diff-chip {
    font-size: 14px;
    padding: 2px 8px;
    transform: rotate(2deg);
    margin-left: 6px;
  }

  /* Category picker */
  .cat-group {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
    max-width: 500px; margin: 0 auto 6px;
  }
  .cat-chip {
    cursor: pointer;
    font-family: 'Special Elite', monospace;
    font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
    background: transparent; color: var(--chalk-dim);
    border: 2px dashed var(--chalk-dim);
    border-radius: 20px; padding: 6px 14px;
    transition: all 0.15s ease;
  }
  .cat-chip:hover { color: var(--chalk); border-color: var(--chalk); }
  .cat-chip.selected {
    border-style: solid; color: var(--board);
    background: var(--chalk-yellow); border-color: var(--chalk-yellow);
  }

  /* Level grid */
  .level-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
    max-width: 520px;
    margin: 4px auto 10px;
  }
  .level-btn {
    aspect-ratio: 1 / 1;
    cursor: pointer;
    font-family: 'Shadows Into Light', cursive;
    font-size: 18px;
    background: transparent;
    color: var(--chalk);
    border: 2px dashed rgba(245,241,230,0.35);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    transition: all 0.15s ease;
  }
  .level-btn:hover:not(:disabled) {
    border-color: var(--chalk-yellow); color: var(--chalk-yellow);
    transform: translateY(-1px);
  }
  .level-btn.cleared {
    border-style: solid;
    border-color: var(--chalk-green);
    color: var(--chalk-green);
    background: rgba(126,217,87,0.10);
  }
  .level-btn.current {
    border-style: solid;
    border-color: var(--chalk-yellow);
    color: var(--chalk-yellow);
    background: rgba(245,215,110,0.16);
    box-shadow: 0 0 0 2px rgba(245,215,110,0.25);
  }
  .level-btn:disabled {
    opacity: 0.35; cursor: not-allowed;
    color: var(--chalk-dim); border-color: rgba(245,241,230,0.15);
  }
  .level-hint {
    text-align: center; font-family: 'Caveat', cursive;
    color: var(--chalk-dim); font-size: 17px; margin: 2px 0 10px;
  }
  .level-header {
    display: flex; justify-content: space-between; align-items: baseline;
    max-width: 520px; margin: 0 auto 4px;
    font-family: 'Caveat', cursive; color: var(--chalk-dim); font-size: 18px;
  }
  .level-header strong { color: var(--chalk-yellow); font-family: 'Shadows Into Light', cursive; font-size: 22px; }

  @media (max-width: 520px) {
    .level-grid { grid-template-columns: repeat(6, 1fr); }
  }
  @media (max-width: 420px) {
    .frame { padding: 10px; }
    .board { padding: 22px 16px 18px; }
    .option { font-size: 15px; }
    .diff-group { grid-template-columns: 1fr; }
    .level-grid { grid-template-columns: repeat(5, 1fr); gap: 5px; }
    .level-btn { font-size: 16px; }
  }
</style>
</head>

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Seeded shuffle (mulberry32) so a given (difficulty, level, cats) produces a stable set
  function seededShuffle(arr, seed) {
    const a = arr.slice();
    let t = seed >>> 0;
    function rnd() {
      t += 0x6D2B79F5;
      let x = t;
      x = Math.imul(x ^ (x >>> 15), x | 1);
      x ^= x + Math.imul(x ^ (x >>> 7), x | 61);
      return ((x ^ (x >>> 14)) >>> 0) / 4294967296;
    }
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rnd() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  function el(tag, opts = {}, children = []) {
    const node = document.createElement(tag);
    if (opts.class) node.className = opts.class;
    if (opts.text != null) node.textContent = opts.text;
    if (opts.attrs) for (const k in opts.attrs) node.setAttribute(k, opts.attrs[k]);
    if (opts.on) for (const evt in opts.on) node.addEventListener(evt, opts.on[evt]);
    for (const c of children) if (c) node.appendChild(c);
    return node;
  }

  function clearBoard() {
    while (board.firstChild) board.removeChild(board.firstChild);
  }

  function filteredPool(diffKey) {
    return QUESTIONS.filter(q =>
      q.difficulty === diffKey && selectedCategories.has(q.category)
    );
  }

  // Build a stable, unique-feeling 5-question set for a given level.
  // Cycles through the pool with an offset so each level differs.
  function buildLevelQuestions(diffKey, level) {
    const pool = filteredPool(diffKey);
    if (pool.length === 0) return [];
    const catsKey = Array.from(selectedCategories).sort().join("|");
    const seed = hashStr(diffKey + "#" + catsKey + "#L" + level);
    const shuffled = seededShuffle(pool, seed);
    const need = Math.min(QUIZ_LENGTH, Math.max(3, pool.length));
    const out = [];
    for (let i = 0; i < need; i++) {
      out.push(shuffled[(i + (level - 1) * 2) % shuffled.length]);
    }
    return out;
  }

  // ---- Screens ----
  function renderStart() {
    clearBoard();
    const title = el("h1", { class: "title", text: "The Daily Special" });
    const sub = el("p", { class: "subtitle", text: "~ Food Trivia Quiz ~" });
    const hr = el("hr", { class: "rule" });
    const desc = el("p", {
      class: "description",
      text: "Pick your categories, choose a difficulty, and work through 50 levels of tasty trivia."
    });

    // Category picker
    const catLabel = el("p", { class: "diff-label", text: "Categories" });
    const catWrap = el("div", { class: "cat-group", attrs: { role: "group", "aria-label": "Categories" } });
    const catButtons = [];
    ALL_CATEGORIES.forEach(name => {
      const chip = el("button", {
        class: "cat-chip" + (selectedCategories.has(name) ? " selected" : ""),
        attrs: { type: "button", "aria-pressed": selectedCategories.has(name) ? "true" : "false" },
        text: name,
        on: {
          click: () => {
            if (selectedCategories.has(name)) {
              if (selectedCategories.size === 1) return; // keep at least one
              selectedCategories.delete(name);
            } else {
              selectedCategories.add(name);
            }
            renderStart(); // re-render to refresh level counts/labels
          }
        }
      });
      catButtons.push(chip);
      catWrap.appendChild(chip);
    });

    // Difficulty picker
    const diffLabel = el("p", { class: "diff-label", text: "Choose your difficulty" });
    const diffWrap = el("div", { class: "diff-group", attrs: { role: "radiogroup", "aria-label": "Difficulty" } });
    const diffButtons = [];
    DIFFICULTIES.forEach(d => {
      const pool = filteredPool(d.key);
      const btn = el("button", {
        class: "diff-btn" + (d.key === difficulty ? " selected" : ""),
        attrs: { type: "button", "data-diff": d.key, "aria-pressed": d.key === difficulty ? "true" : "false" },
        on: {
          click: () => {
            difficulty = d.key;
            renderStart();
          }
        }
      }, [
        el("span", { class: "diff-name", text: d.label }),
        el("span", { class: "diff-blurb", text: d.blurb }),
        el("span", { class: "diff-count", text: pool.length + " Qs · Lv " + unlocked[d.key] + "/" + TOTAL_LEVELS })
      ]);
      diffButtons.push(btn);
      diffWrap.appendChild(btn);
    });

    // Level grid header
    const header = el("div", { class: "level-header" }, [
      el("span", { text: "Select a level" }),
      el("span", {}, [
        document.createTextNode("Unlocked: "),
        el("strong", { text: unlocked[difficulty] + " / " + TOTAL_LEVELS })
      ])
    ]);

    // Level grid
    const pool = filteredPool(difficulty);
    const grid = el("div", { class: "level-grid", attrs: { role: "list", "aria-label": "Levels" } });
    for (let lv = 1; lv <= TOTAL_LEVELS; lv++) {
      const isUnlocked = lv <= unlocked[difficulty] && pool.length > 0;
      const isCleared = lv < unlocked[difficulty];
      const isCurrent = lv === unlocked[difficulty] && pool.length > 0;
      const b = el("button", {
        class: "level-btn" + (isCleared ? " cleared" : "") + (isCurrent ? " current" : ""),
        text: String(lv),
        attrs: { type: "button", "aria-label": "Level " + lv, ...(isUnlocked ? {} : { disabled: "true" }) },
        on: {
          click: () => {
            if (!isUnlocked) return;
            currentLevel = lv;
            startGame();
          }
        }
      });
      grid.appendChild(b);
    }

    const hint = el("p", {
      class: "level-hint",
      text: pool.length === 0
        ? "No questions match your category picks for this difficulty — try adding a category."
        : "Clear a level to unlock the next. Answers shuffle every round."
    });

    board.append(title, sub, hr, desc, catLabel, catWrap, diffLabel, diffWrap, header, grid, hint);
  }

  function startGame() {
    const chosen = buildLevelQuestions(difficulty, currentLevel);
    if (chosen.length === 0) { renderStart(); return; }
    questions = chosen.map(q => {
      const indices = shuffle(q.options.map((_, i) => i));
      return {
        ...q,
        options: indices.map(i => q.options[i]),
        answer: indices.indexOf(q.answer)
      };
    });
    currentIndex = 0;
    score = 0;
    answered = false;
    results = [];
    renderQuestion();
  }

  function renderQuestion() {
    clearBoard();
    answered = false;
    const q = questions[currentIndex];

    // Meta row: category + difficulty + score
    const meta = el("div", { class: "meta-row" });
    const cat = el("span", { class: "category-chip", text: q.category });
    const diff = el("span", { class: "category-chip diff-chip diff-" + (q.difficulty || difficulty), text: "LV " + currentLevel + " · " + (q.difficulty || difficulty).toUpperCase() });
    const scoreLine = el("span", { class: "score-line", text: `Score: ${score}` });
    meta.append(cat, diff, scoreLine);

    // Progress dots
    const dots = el("div", { class: "progress-dots" });
    for (let i = 0; i < questions.length; i++) {
      const d = el("span", { class: "dot" });
      if (i < results.length) {
        d.classList.add(results[i].correct ? "correct" : "wrong");
      } else if (i === currentIndex) {
        d.classList.add("current");
      }
      dots.appendChild(d);
    }

    const progressText = el("div", {
      class: "center",
      attrs: { style: "font-family:'Caveat',cursive;color:var(--chalk-dim);font-size:18px;margin-bottom:4px;" },
      text: `Question ${currentIndex + 1} of ${questions.length}`
    });

    const questionEl = el("div", { class: "question", text: q.question });

    const optionsWrap = el("div", { class: "options" });
    const letters = ["A", "B", "C", "D"];
    const buttons = [];
    q.options.forEach((opt, i) => {
      const btn = el("button", {
        class: "option",
        on: { click: () => handleAnswer(i, buttons, q) }
      }, [
        el("span", { class: "letter", text: letters[i] }),
        el("span", { text: opt })
      ]);
      optionsWrap.appendChild(btn);
      buttons.push(btn);
    });

    const actions = el("div", { class: "actions" });
    // Next button hidden until answered
    const nextBtn = el("button", {
      class: "btn hidden",
      text: currentIndex === questions.length - 1 ? "See Results" : "Next Question",
      attrs: { id: "next-btn" },
      on: { click: nextQuestion }
    });
    actions.appendChild(nextBtn);

    board.append(meta, progressText, dots, questionEl, optionsWrap, actions);
  }

  function handleAnswer(selectedIdx, buttons, q) {
    if (answered) return;
    answered = true;
    const isCorrect = selectedIdx === q.answer;
    if (isCorrect) score += 1;
    results.push({ correct: isCorrect });

    buttons.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.answer) btn.classList.add("correct");
      else if (i === selectedIdx) btn.classList.add("wrong");
    });

    // Fun fact
    const fact = el("div", { class: "fun-fact" }, [
      el("strong", { text: isCorrect ? "Correct! " : "Not quite. " }),
      el("span", { text: q.fact })
    ]);
    // Insert before actions
    const actions = board.querySelector(".actions");
    board.insertBefore(fact, actions);

    // Update score line
    const scoreLine = board.querySelector(".score-line");
    if (scoreLine) scoreLine.textContent = `Score: ${score}`;

    // Update current dot
    const dots = board.querySelectorAll(".dot");
    if (dots[currentIndex]) {
      dots[currentIndex].classList.remove("current");
      dots[currentIndex].classList.add(isCorrect ? "correct" : "wrong");
    }

    // Reveal next button
    const nextBtn = document.getElementById("next-btn");
    if (nextBtn) nextBtn.classList.remove("hidden");
  }

  function nextQuestion() {
    if (currentIndex < questions.length - 1) {
      currentIndex += 1;
      renderQuestion();
    } else {
      renderResults();
    }
  }

  function renderResults() {
    clearBoard();
    const total = questions.length;
    const correct = score;
    const wrong = total - correct;
    const pct = Math.round((correct / total) * 100);
    const passed = pct >= 60; // 3/5 or better clears the level
    const isLastLevel = currentLevel >= TOTAL_LEVELS;

    // Unlock next level on pass
    let newlyUnlocked = false;
    if (passed && !isLastLevel && unlocked[difficulty] === currentLevel) {
      unlocked[difficulty] = currentLevel + 1;
      newlyUnlocked = true;
    }

    let verdict;
    if (pct === 100) verdict = "Perfect plate! Michelin‑star mind. ⭐";
    else if (pct >= 80) verdict = "Executive chef material — very well done!";
    else if (pct >= 60) verdict = "Solid sous‑chef performance.";
    else if (pct >= 40) verdict = "Still prepping — need 60% to clear.";
    else verdict = "Back to culinary school — need 60% to clear.";

    const title = el("h2", { class: "results-title", text: passed ? ("Level " + currentLevel + " Cleared!") : ("Level " + currentLevel) });
    const big = el("div", { class: "big-score" });
    big.append(document.createTextNode(pct + "%"));
    big.appendChild(el("small", { text: ` (${correct}/${total})` }));

    const v = el("p", { class: "verdict", text: verdict });

    const stats = el("div", { class: "stat-row" }, [
      el("div", { class: "stat total" }, [
        el("span", { class: "num", text: String(total) }),
        el("span", { text: "Questions" })
      ]),
      el("div", { class: "stat correct" }, [
        el("span", { class: "num", text: String(correct) }),
        el("span", { text: "Correct" })
      ]),
      el("div", { class: "stat wrong" }, [
        el("span", { class: "num", text: String(wrong) }),
        el("span", { text: "Incorrect" })
      ])
    ]);

    const actions = el("div", { class: "actions", attrs: { style: "display:flex;gap:10px;justify-content:center;flex-wrap:wrap;" } });
    if (passed && !isLastLevel) {
      actions.appendChild(el("button", {
        class: "btn",
        text: "Next Level →",
        on: { click: () => { currentLevel += 1; startGame(); } }
      }));
    }
    actions.appendChild(el("button", {
      class: "btn",
      text: passed ? "Replay Level" : "Try Again",
      on: { click: startGame }
    }));
    actions.appendChild(el("button", {
      class: "btn",
      text: "Level Select",
      on: { click: renderStart }
    }));

    const noteText = isLastLevel && passed
      ? "You cleared every level on " + difficulty + " — chef's hat earned! 🎩"
      : (newlyUnlocked ? ("Level " + (currentLevel + 1) + " unlocked!") : "Score 60% or higher to unlock the next level.");
    const note = el("p", { class: "footer-note", text: noteText });

    board.append(title, big, v, stats, actions, note);
  }

  // Boot
  renderStart();
})();
</script>
</body>
</html>
