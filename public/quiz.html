<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Food Trivia — Chalkboard Menu Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Shadows+Into+Light&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #f7ecd0;
    --ink-dim: #cdb98a;
    --ink-muted: #8f7f5c;
    --gold: #e8c56b;
    --gold-bright: #ffd97a;
    --gold-deep: #a3792a;
    --wine: #4a1220;
    --wine-dark: #2a0812;
    --plum: #1a0710;
    --leaf: #7ed957;
    --ember: #ff7a59;
    --crimson: #ff5468;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    font-family: 'Special Elite', 'Courier New', monospace;
    background:
      radial-gradient(ellipse at 15% 10%, rgba(232,197,107,0.10), transparent 55%),
      radial-gradient(ellipse at 85% 90%, rgba(255,122,89,0.10), transparent 55%),
      linear-gradient(160deg, #1e0710 0%, #340b1c 45%, #14060c 100%);
    color: var(--ink);
    padding: 20px 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .frame {
    width: 100%;
    max-width: 680px;
    padding: 3px;
    border-radius: 22px;
    background:
      linear-gradient(135deg, #6a4a15 0%, var(--gold) 25%, #f7e29a 50%, var(--gold) 75%, #6a4a15 100%);
    box-shadow:
      0 30px 80px -20px rgba(0,0,0,0.75),
      0 0 60px -20px rgba(232,197,107,0.35);
  }
  .board {
    position: relative;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(232,197,107,0.10), transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(255,122,89,0.08), transparent 55%),
      linear-gradient(180deg, #2a0a18 0%, var(--wine-dark) 55%, #1a0510 100%);
    border-radius: 20px;
    padding: 34px 26px 26px;
    min-height: 540px;
    box-shadow:
      inset 0 0 80px rgba(0,0,0,0.55),
      inset 0 1px 0 rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .board::before {
    content: "";
    position: absolute; inset: 12px;
    border: 1px solid rgba(232,197,107,0.22);
    border-radius: 14px;
    pointer-events: none;
  }
  .board::after {
    content: "";
    position: absolute; inset: 0;
    background-image:
      radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 6px 6px;
    pointer-events: none;
    opacity: 0.6;
  }
  .board > * { position: relative; z-index: 1; }

  /* Screen transitions */
  @keyframes screenIn {
    0%   { opacity: 0; transform: translateY(14px) scale(0.985); filter: blur(2px); }
    60%  { filter: blur(0); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }
  @keyframes childIn {
    0%   { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes tilePop {
    0%   { opacity: 0; transform: scale(0.85); }
    70%  { transform: scale(1.04); }
    100% { opacity: 1; transform: scale(1); }
  }
  .board.enter { animation: screenIn 420ms cubic-bezier(.2,.7,.2,1) both; }
  .board.enter > * { animation: childIn 480ms cubic-bezier(.2,.7,.2,1) both; opacity: 0; }
  .board.enter > *:nth-child(1) { animation-delay: 40ms; }
  .board.enter > *:nth-child(2) { animation-delay: 90ms; }
  .board.enter > *:nth-child(3) { animation-delay: 140ms; }
  .board.enter > *:nth-child(4) { animation-delay: 190ms; }
  .board.enter > *:nth-child(5) { animation-delay: 230ms; }
  .board.enter > *:nth-child(6) { animation-delay: 270ms; }
  .board.enter > *:nth-child(7) { animation-delay: 310ms; }
  .board.enter > *:nth-child(8) { animation-delay: 340ms; }
  .board.enter > *:nth-child(n+9) { animation-delay: 370ms; }
  .board.enter .level-grid > * { animation: tilePop 380ms cubic-bezier(.2,.9,.3,1.2) both; }
  .board.enter .level-grid > *:nth-child(5n+1) { animation-delay: 60ms; }
  .board.enter .level-grid > *:nth-child(5n+2) { animation-delay: 100ms; }
  .board.enter .level-grid > *:nth-child(5n+3) { animation-delay: 140ms; }
  .board.enter .level-grid > *:nth-child(5n+4) { animation-delay: 180ms; }
  .board.enter .level-grid > *:nth-child(5n+5) { animation-delay: 220ms; }

  @media (prefers-reduced-motion: reduce) {
    .board.enter, .board.enter > *, .board.enter .level-grid > * { animation: none !important; opacity: 1 !important; transform: none !important; filter: none !important; }
  }

  /* Interactive micro-animations */
  .btn, .mini, .chip, .diff-card, .level-tile, .option {
    transition: transform 180ms cubic-bezier(.2,.7,.2,1), box-shadow 180ms ease, background-color 180ms ease, color 180ms ease, border-color 180ms ease;
  }
  .btn:hover, .mini:hover, .chip:hover, .diff-card:hover, .level-tile:not(.locked):hover, .option:hover { transform: translateY(-2px); }
  .btn:active, .mini:active, .chip:active, .diff-card:active, .level-tile:not(.locked):active, .option:active { transform: translateY(0) scale(0.98); }

  .brand {
    text-align: center;
    font-family: 'Caveat', cursive;
    color: var(--gold);
    letter-spacing: 6px;
    font-size: 14px;
    text-transform: uppercase;
    margin: 0 0 4px;
    opacity: 0.85;
  }
  .title {
    font-family: 'Shadows Into Light', cursive;
    font-size: clamp(40px, 9vw, 62px);
    background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 55%, var(--gold-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-align: center;
    margin: 0 0 4px;
    letter-spacing: 1px;
    filter: drop-shadow(0 2px 0 rgba(0,0,0,0.35));
  }
  .subtitle {
    font-family: 'Caveat', cursive;
    text-align: center;
    color: var(--ink-dim);
    font-size: 22px;
    margin: 0 0 18px;
  }
  .rule {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,197,107,0.55), transparent);
    margin: 14px 0 18px;
  }
  .description {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    line-height: 1.45;
    color: var(--ink);
    text-align: center;
    margin: 0 auto 22px;
    max-width: 480px;
  }
  .btn {
    font-family: 'Shadows Into Light', cursive;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold) 55%, var(--gold-deep));
    color: #2a0812;
    border: 1px solid rgba(255,255,255,0.35);
    padding: 12px 28px;
    font-size: 24px;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 8px 20px -8px rgba(232,197,107,0.55), inset 0 1px 0 rgba(255,255,255,0.5);
    transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 14px 26px -10px rgba(232,197,107,0.7), inset 0 1px 0 rgba(255,255,255,0.6); filter: brightness(1.05); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; filter: grayscale(0.4); }
  .btn.ghost {
    background: transparent;
    color: var(--gold);
    border: 1px solid rgba(232,197,107,0.55);
    box-shadow: none;
  }
  .btn.ghost:hover { background: rgba(232,197,107,0.10); }
  .mute-btn {
    appearance: none;
    background: rgba(232,197,107,0.08);
    color: var(--gold);
    border: 1px solid rgba(232,197,107,0.35);
    border-radius: 999px;
    padding: 9px 14px;
    font: 600 13px/1 'Inter', system-ui, sans-serif;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: background 180ms ease, transform 180ms ease, border-color 180ms ease;
  }
  .mute-btn:hover { background: rgba(232,197,107,0.16); border-color: rgba(232,197,107,0.55); transform: translateY(-2px); }
  .mute-btn[aria-pressed="true"] { opacity: 0.75; }
  .mute-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .center { text-align: center; }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: var(--ink-dim);
    margin-bottom: 10px;
    flex-wrap: wrap;
    gap: 6px;
  }
  .category-chip {
    display: inline-block;
    font-family: 'Shadows Into Light', cursive;
    font-size: 18px;
    color: var(--wine-dark);
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    padding: 3px 14px;
    border-radius: 999px;
    transform: rotate(-2deg);
    box-shadow: 0 3px 10px -4px rgba(0,0,0,0.6);
  }
  .progress-dots {
    display: flex; gap: 6px; flex-wrap: wrap;
    justify-content: center;
    margin: 6px 0 18px;
  }
  .dot {
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid var(--ink-muted);
    background: transparent;
  }
  .dot.done { background: var(--gold); border-color: var(--gold); }
  .dot.correct { background: var(--leaf); border-color: var(--leaf); }
  .dot.wrong { background: var(--crimson); border-color: var(--crimson); }
  .dot.current { box-shadow: 0 0 0 3px rgba(232,197,107,0.35); }

  .question {
    font-family: 'Caveat', cursive;
    font-size: clamp(26px, 5.5vw, 36px);
    line-height: 1.25;
    color: var(--ink);
    margin: 6px 0 18px;
    text-align: center;
  }
  .options { display: grid; gap: 10px; }
  .option {
    font-family: 'Special Elite', monospace;
    font-size: 16px;
    text-align: left;
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    color: var(--ink);
    border: 1px solid rgba(232,197,107,0.28);
    border-radius: 12px;
    padding: 13px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .option:hover:not(:disabled) { border-color: var(--gold); background: rgba(232,197,107,0.10); transform: translateX(2px); }
  .option:disabled { cursor: default; }
  .option .letter {
    display: inline-flex;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold-deep));
    color: var(--wine-dark);
    align-items: center; justify-content: center;
    font-family: 'Shadows Into Light', cursive;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
  }
  .option.correct {
    border-color: var(--leaf);
    background: rgba(126,217,87,0.18);
    color: #e2ffcd;
    animation: pop 0.35s ease;
  }
  .option.wrong {
    border-color: var(--crimson);
    background: rgba(255,84,104,0.18);
    color: #ffd4d9;
    animation: shake 0.35s ease;
  }
  @keyframes pop { 0%{transform:scale(1);} 40%{transform:scale(1.03);} 100%{transform:scale(1);} }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }

  .fun-fact {
    margin-top: 16px;
    padding: 12px 14px;
    background: linear-gradient(180deg, rgba(232,197,107,0.10), rgba(232,197,107,0.04));
    border-left: 4px solid var(--gold);
    border-radius: 8px;
    font-family: 'Caveat', cursive;
    font-size: 20px;
    line-height: 1.35;
    color: var(--ink);
  }
  .fun-fact strong { color: var(--gold-bright); font-family: 'Shadows Into Light', cursive; font-size: 22px; }

  .actions { margin-top: 18px; text-align: center; }

  .score-line {
    font-family: 'Shadows Into Light', cursive;
    font-size: 22px;
    color: var(--gold);
  }

  .results-title {
    font-family: 'Shadows Into Light', cursive;
    font-size: 44px;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold-deep));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-align: center;
    margin: 6px 0 4px;
  }
  .big-score {
    font-family: 'Shadows Into Light', cursive;
    font-size: 88px;
    text-align: center;
    color: var(--ink);
    line-height: 1;
    margin: 8px 0;
    text-shadow: 0 2px 0 rgba(0,0,0,0.4);
  }
  .big-score small { font-size: 28px; color: var(--ink-dim); }
  .verdict {
    font-family: 'Caveat', cursive;
    font-size: 26px;
    text-align: center;
    color: var(--ink);
    margin: 8px 0 16px;
  }
  .stat-row {
    display: flex; justify-content: space-around;
    margin: 10px 0 18px;
    font-family: 'Caveat', cursive;
    font-size: 22px;
  }
  .stat { text-align: center; }
  .stat .num { display:block; font-family: 'Shadows Into Light', cursive; font-size: 34px; }
  .stat.correct .num { color: var(--leaf); }
  .stat.wrong .num { color: var(--crimson); }
  .stat.total .num { color: var(--gold); }

  .hidden { display: none !important; }

  .footer-note {
    text-align: center;
    margin-top: 14px;
    font-family: 'Caveat', cursive;
    color: var(--ink-dim);
    font-size: 18px;
  }

  /* Timer */
  .timer-wrap { margin: 4px 0 10px; }
  .timer-bar {
    position: relative;
    height: 10px;
    background: rgba(232,197,107,0.10);
    border: 1px solid rgba(232,197,107,0.28);
    border-radius: 999px;
    overflow: hidden;
  }
  .timer-fill {
    position: absolute; inset: 0 auto 0 0;
    width: 100%;
    background: linear-gradient(90deg, var(--leaf), var(--gold-bright));
    transform-origin: left center;
    transition: transform 0.25s linear, background 0.3s ease;
  }
  .timer-fill.warn { background: linear-gradient(90deg, var(--gold-bright), var(--ember)); }
  .timer-fill.danger { background: linear-gradient(90deg, var(--ember), var(--crimson)); animation: pulse 0.7s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
  .timer-text {
    display: flex; justify-content: space-between; align-items: baseline;
    font-family: 'Caveat', cursive; color: var(--ink-dim);
    font-size: 16px; margin-top: 2px;
  }
  .timer-text .clock {
    font-family: 'Shadows Into Light', cursive;
    color: var(--gold); font-size: 20px;
  }
  .timer-text .clock.danger { color: var(--crimson); }

  .review { margin: 18px 0 22px; display: grid; gap: 12px; }
  .review-title {
    font-family: 'Shadows Into Light', cursive;
    font-size: 24px;
    color: var(--gold);
    text-align: center;
    margin: 4px 0 2px;
  }
  .review-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(232,197,107,0.22);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .review-card.correct { border-color: var(--leaf); background: rgba(126,217,87,0.08); }
  .review-card.wrong { border-color: var(--crimson); background: rgba(255,84,104,0.08); }
  .review-q { font-family: 'Caveat', cursive; font-size: 20px; line-height: 1.3; margin: 0 0 8px; color: var(--ink); }
  .review-row { font-family: 'Special Elite', monospace; font-size: 14px; line-height: 1.5; margin: 2px 0; }
  .review-row .label { color: var(--ink-dim); margin-right: 6px; }
  .review-row .value { color: var(--ink); }
  .review-row .selected { color: var(--crimson); }
  .review-row.correct-answer .value { color: var(--leaf); }
  .why-row { margin-top: 8px; display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
  .why-btn {
    font-family: 'Special Elite', monospace;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(232,197,107,0.12);
    border: 1px solid rgba(232,197,107,0.5);
    color: var(--gold);
    cursor: pointer;
    transition: background 180ms ease, transform 180ms ease, border-color 180ms ease;
  }
  .why-btn:hover:not(:disabled) { background: rgba(232,197,107,0.22); border-color: var(--gold); transform: translateY(-1px); }
  .why-btn:disabled { opacity: 0.6; cursor: default; }
  .why-text {
    font-family: 'Caveat', cursive;
    font-size: 17px;
    line-height: 1.35;
    color: var(--ink);
    background: rgba(232,197,107,0.06);
    border-left: 2px solid var(--gold);
    padding: 6px 10px;
    border-radius: 6px;
    flex: 1 1 100%;
  }
  .why-text.error { color: var(--crimson); border-left-color: var(--crimson); background: rgba(255,84,104,0.06); }

  /* Page navigation */
  .page-nav {
    display: flex; justify-content: space-between; align-items: center;
    margin: -8px 0 8px;
    font-family: 'Caveat', cursive; color: var(--ink-dim); font-size: 18px;
  }
  .page-nav .step { letter-spacing: 2px; text-transform: uppercase; font-size: 12px; font-family: 'Special Elite', monospace; color: var(--gold); }
  .back-link {
    background: none; border: none; color: var(--ink-dim);
    font-family: 'Caveat', cursive; font-size: 18px; cursor: pointer; padding: 0;
  }
  .back-link:hover { color: var(--gold); }

  .diff-label {
    text-align: center;
    font-family: 'Caveat', cursive;
    color: var(--ink-dim);
    font-size: 20px;
    margin: 18px 0 8px;
  }
  .diff-group {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 0 auto 18px;
    max-width: 500px;
  }
  .diff-btn {
    cursor: pointer;
    font-family: 'Special Elite', monospace;
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    color: var(--ink);
    border: 1px solid rgba(232,197,107,0.22);
    border-radius: 12px;
    padding: 12px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
  }
  .diff-btn:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }
  .diff-btn.selected {
    border-color: var(--gold);
    background: linear-gradient(180deg, rgba(232,197,107,0.20), rgba(232,197,107,0.06));
    color: var(--gold-bright);
    box-shadow: 0 0 0 1px rgba(232,197,107,0.35), 0 8px 24px -12px rgba(232,197,107,0.5);
  }
  .diff-name { font-family: 'Shadows Into Light', cursive; font-size: 22px; letter-spacing: 1px; }
  .diff-blurb { font-family: 'Caveat', cursive; font-size: 16px; color: var(--ink-dim); }
  .diff-btn.selected .diff-blurb { color: var(--ink); }
  .diff-count { font-size: 11px; letter-spacing: 1px; opacity: 0.75; text-transform: uppercase; }

  .category-chip.diff-easy { background: transparent; border: 1px solid var(--leaf); color: var(--leaf); }
  .category-chip.diff-medium { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
  .category-chip.diff-hard { background: transparent; border: 1px solid var(--crimson); color: var(--crimson); }
  .diff-chip { font-size: 14px; padding: 2px 10px; transform: rotate(2deg); margin-left: 6px; }

  /* Category picker */
  .cat-group {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
    max-width: 540px; margin: 0 auto 6px;
  }
  .cat-chip {
    cursor: pointer;
    font-family: 'Special Elite', monospace;
    font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
    background: rgba(255,255,255,0.03); color: var(--ink-dim);
    border: 1px solid rgba(232,197,107,0.28);
    border-radius: 999px; padding: 7px 14px;
    transition: all 0.15s ease;
  }
  .cat-chip:hover { color: var(--ink); border-color: var(--gold); }
  .cat-chip.selected {
    color: var(--wine-dark);
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    border-color: var(--gold);
    box-shadow: 0 4px 14px -6px rgba(232,197,107,0.6);
  }
  .cat-actions { display:flex; gap: 8px; justify-content:center; margin: 8px 0 6px; }
  .cat-actions .mini {
    background: none; border: none; color: var(--ink-muted);
    font-family: 'Caveat', cursive; font-size: 16px; cursor: pointer;
    text-decoration: underline dotted;
  }
  .cat-actions .mini:hover { color: var(--gold); }

  /* Level grid */
  .level-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
    max-width: 620px;
    margin: 4px auto 10px;
  }
  .level-btn {
    aspect-ratio: 1 / 1;
    cursor: pointer;
    font-family: 'Shadows Into Light', cursive;
    background: rgba(255,255,255,0.03);
    color: var(--ink);
    border: 1px solid rgba(232,197,107,0.22);
    border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2px;
    line-height: 1;
    transition: all 0.15s ease;
  }
  .level-btn .lv-num { font-size: 18px; }
  .level-btn .lv-meta {
    font-family: 'Caveat', cursive;
    font-size: 11px;
    color: var(--ink-dim);
    margin-top: 2px;
    letter-spacing: 0.2px;
  }
  .level-btn:hover:not(:disabled) {

    if (pool.length === 0) return [];
    const catsKey = Array.from(selectedCategories).sort().join("|");
    const seed = hashStr(diffKey + "#" + catsKey + "#L" + level);
    const shuffled = seededShuffle(pool, seed);
    const need = Math.min(questionsForLevel(level), Math.max(3, pool.length));
    const out = [];
    for (let i = 0; i < need; i++) {
      out.push(shuffled[(i + (level - 1) * 2) % shuffled.length]);
    }
    return out;
  }

  // ---- Screens ----
  function renderStart() { renderHome(); }

  function renderHome() {
    clearBoard();
    const brand = el("p", { class: "brand", text: "· The Daily Special ·" });
    const title = el("h1", { class: "title", text: "Food Trivia" });
    const sub = el("p", { class: "subtitle", text: "~ a tasting menu of tasty questions ~" });
    const hr = el("hr", { class: "rule" });
    const desc = el("p", {
      class: "description",
      text: "Test your palate across world cuisines, nutrition, and food science. 50 levels of five‑question rounds, a 20‑second timer, and a bite of trivia after every answer."
    });

    const summary = el("div", { class: "summary-card" }, [
      el("span", {}, [
        document.createTextNode("Difficulty "),
        el("strong", { text: difficulty.charAt(0).toUpperCase() + difficulty.slice(1) })
      ]),
      el("span", {}, [
        document.createTextNode("Categories "),
        el("strong", { text: String(selectedCategories.size) + "/" + ALL_CATEGORIES.length })
      ]),
      el("span", {}, [
        document.createTextNode("Progress "),
        el("strong", { text: "Lv " + unlocked[difficulty] + " / " + TOTAL_LEVELS })
      ])
    ]);

    const actions = el("div", { class: "actions", attrs: { style: "display:flex;gap:10px;justify-content:center;flex-wrap:wrap;" } }, [
      el("button", { class: "btn", text: "Start Cooking →", on: { click: renderCategories } }),
      el("button", { class: "btn ghost", text: "Jump to Levels", on: { click: renderLevels } }),
      makeMuteButton()
    ]);

    const note = el("p", { class: "footer-note", text: "Tip: clear a level to unlock the next. Score at least 60%." });

    board.append(brand, title, sub, hr, desc, summary, actions, note);
  }

  function renderCategories() {
    clearBoard();
    const nav = el("div", { class: "page-nav" }, [
      el("button", { class: "back-link", text: "← Home", on: { click: renderHome } }),
      el("span", { class: "step", text: "Step 1 of 2" })
    ]);
    const title = el("h1", { class: "title", text: "Pick Your Menu" });
    const sub = el("p", { class: "subtitle", text: "Choose categories and difficulty" });
    const hr = el("hr", { class: "rule" });

    // Category picker
    const catLabel = el("p", { class: "diff-label", text: "Categories" });
    const catWrap = el("div", { class: "cat-group", attrs: { role: "group", "aria-label": "Categories" } });
    ALL_CATEGORIES.forEach(name => {
      const chip = el("button", {
        class: "cat-chip" + (selectedCategories.has(name) ? " selected" : ""),
        attrs: { type: "button", "aria-pressed": selectedCategories.has(name) ? "true" : "false" },
        text: name,
        on: {
          click: () => {
            if (selectedCategories.has(name)) {
              if (selectedCategories.size === 1) return;
              selectedCategories.delete(name);
            } else {
              selectedCategories.add(name);
            }
            renderCategories();
          }
        }
      });
      catWrap.appendChild(chip);
    });
    const catActions = el("div", { class: "cat-actions" }, [
      el("button", { class: "mini", text: "Select all", on: { click: () => { ALL_CATEGORIES.forEach(c => selectedCategories.add(c)); renderCategories(); } } }),
      el("button", { class: "mini", text: "Only one", on: { click: () => { selectedCategories = new Set([ALL_CATEGORIES[0]]); renderCategories(); } } })
    ]);

    // Difficulty picker
    const diffLabel = el("p", { class: "diff-label", text: "Choose your difficulty" });
    const diffWrap = el("div", { class: "diff-group", attrs: { role: "radiogroup", "aria-label": "Difficulty" } });
    DIFFICULTIES.forEach(d => {
      const pool = filteredPool(d.key);
      const btn = el("button", {
        class: "diff-btn" + (d.key === difficulty ? " selected" : ""),
        attrs: { type: "button", "data-diff": d.key, "aria-pressed": d.key === difficulty ? "true" : "false" },
        on: { click: () => { difficulty = d.key; renderCategories(); } }
      }, [
        el("span", { class: "diff-name", text: d.label }),
        el("span", { class: "diff-blurb", text: d.blurb }),
        el("span", { class: "diff-count", text: pool.length + " Qs · Lv " + unlocked[d.key] + "/" + TOTAL_LEVELS })
      ]);
      diffWrap.appendChild(btn);
    });

    const canContinue = filteredPool(difficulty).length > 0;
    const actions = el("div", { class: "actions", attrs: { style: "display:flex;gap:10px;justify-content:center;flex-wrap:wrap;" } }, [
      el("button", { class: "btn ghost", text: "← Back", on: { click: renderHome } }),
      el("button", {
        class: "btn",
        text: "Choose Level →",
        attrs: canContinue ? {} : { disabled: "true" },
        on: { click: () => { if (canContinue) renderLevels(); } }
      })
    ]);

    const hint = el("p", {
      class: "level-hint",
      text: canContinue
        ? "You can change these anytime."
        : "No questions match — pick at least one category with questions in this difficulty."
    });

    board.append(nav, title, sub, hr, catLabel, catWrap, catActions, diffLabel, diffWrap, actions, hint);
  }

  function renderLevels() {
    clearBoard();
    const nav = el("div", { class: "page-nav" }, [
      el("button", { class: "back-link", text: "← Categories", on: { click: renderCategories } }),
      el("span", { class: "step", text: "Step 2 of 2" })
    ]);
    const title = el("h1", { class: "title", text: "Choose a Level" });
    const sub = el("p", { class: "subtitle", text: difficulty.charAt(0).toUpperCase() + difficulty.slice(1) + " · " + selectedCategories.size + " categor" + (selectedCategories.size === 1 ? "y" : "ies") });
    const hr = el("hr", { class: "rule" });

    const header = el("div", { class: "level-header" }, [
      el("span", { text: TOTAL_LEVELS + " rounds · length & timer scale up" }),
      el("span", {}, [
        document.createTextNode("Unlocked: "),
        el("strong", { text: unlocked[difficulty] + " / " + TOTAL_LEVELS })
      ])
    ]);

    // Search
    const searchInput = el("input", {
      attrs: {
        type: "search",
        inputmode: "numeric",
        placeholder: "Search levels (e.g. 42, 1-25, cleared, current, locked)…",
        "aria-label": "Search levels"
      }
    });
    const clearBtn = el("button", {
      class: "clear-btn", text: "Clear",
      attrs: { type: "button" },
      on: { click: () => { searchInput.value = ""; applyFilter(); searchInput.focus(); } }
    });
    const search = el("div", { class: "level-search" }, [searchInput, clearBtn]);

    // Preview panel
    const preview = el("div", {
      class: "level-preview",
      attrs: { id: "level-preview", "aria-live": "polite" }
    });

    const pool = filteredPool(difficulty);
    const grid = el("div", { class: "level-grid", attrs: { role: "list", "aria-label": "Levels" } });
    const empty = el("p", { class: "level-empty hidden", text: "No levels match that search." });

    const tiles = [];
    for (let lv = 1; lv <= TOTAL_LEVELS; lv++) {
      const isUnlocked = lv <= unlocked[difficulty] && pool.length > 0;
      const isCleared = lv < unlocked[difficulty];
      const isCurrent = lv === unlocked[difficulty] && pool.length > 0;
      const qs = questionsForLevel(lv);
      const secs = timerForLevel(difficulty, lv);
      const b = el("button", {
        class: "level-btn" + (isCleared ? " cleared" : "") + (isCurrent ? " current" : ""),
        attrs: {
          type: "button",
          "aria-label": "Level " + lv + " — " + qs + " questions, " + secs + " seconds each",
          title: "Level " + lv + " · " + qs + " Qs · " + secs + "s each",
          ...(isUnlocked ? {} : { disabled: "true" })
        },
        on: {
          click: () => { if (!isUnlocked) return; currentLevel = lv; startGame(); },
          mouseenter: () => showPreview(lv, isUnlocked, isCleared, isCurrent),
          focus: () => showPreview(lv, isUnlocked, isCleared, isCurrent)
        }
      }, [
        el("span", { class: "lv-num", text: String(lv) }),
        el("span", { class: "lv-meta", text: qs + "Q·" + secs + "s" })
      ]);
      b.dataset.level = String(lv);
      b.dataset.state = isCleared ? "cleared" : isCurrent ? "current" : isUnlocked ? "unlocked" : "locked";
      tiles.push(b);
      grid.appendChild(b);
    }

    function showPreview(lv, isUnlocked, isCleared, isCurrent) {
      const qs = questionsForLevel(lv);
      const secs = timerForLevel(difficulty, lv);
      const status = isCleared ? "Cleared" : isCurrent ? "Current" : isUnlocked ? "Ready" : "Locked";
      preview.replaceChildren(
        el("span", {}, [
          document.createTextNode("Level "),
          el("strong", { text: String(lv) }),
          document.createTextNode(" · " + status)
        ]),
        el("span", {}, [
          el("strong", { text: String(qs) }),
          document.createTextNode(" questions")
        ]),
        el("span", {}, [
          el("strong", { text: secs + "s" }),
          document.createTextNode(" per question")
        ])
      );
    }
    // Default preview = current level (or level 1)
    const focusLv = Math.min(unlocked[difficulty] || 1, TOTAL_LEVELS);
    showPreview(focusLv, focusLv <= unlocked[difficulty] && pool.length > 0, focusLv < unlocked[difficulty], focusLv === unlocked[difficulty]);

    function applyFilter() {
      const raw = (searchInput.value || "").trim().toLowerCase();
      let match;
      if (!raw) {
        match = () => true;
      } else {
        const rangeM = raw.match(/^(\d+)\s*[-–]\s*(\d+)$/);
        const numM = raw.match(/^\d+$/);
        if (rangeM) {
          const lo = Math.min(+rangeM[1], +rangeM[2]);
          const hi = Math.max(+rangeM[1], +rangeM[2]);
          match = (lv, state) => lv >= lo && lv <= hi;
        } else if (numM) {
          const n = +numM;
          match = (lv) => String(lv).includes(raw);
        } else if (["cleared", "current", "unlocked", "locked", "ready"].includes(raw)) {
          const target = raw === "ready" ? "unlocked" : raw;
          match = (lv, state) => state === target;
        } else {
          match = () => false;
        }
      }
      let shown = 0;
      let firstVisible = null;
      tiles.forEach(t => {
        const lv = +t.dataset.level;
        const ok = match(lv, t.dataset.state);
        t.classList.toggle("hidden", !ok);
        if (ok) { shown++; if (firstVisible == null) firstVisible = lv; }
      });
      empty.classList.toggle("hidden", shown !== 0);
      if (firstVisible != null) {
        const lv = firstVisible;
        const isUnlocked = lv <= unlocked[difficulty] && pool.length > 0;
        showPreview(lv, isUnlocked, lv < unlocked[difficulty], lv === unlocked[difficulty] && pool.length > 0);
      }
    }
    searchInput.addEventListener("input", applyFilter);

    const hint = el("p", {
      class: "level-hint",
      text: pool.length === 0
        ? "No questions match your category picks for this difficulty — go back and add a category."
        : "Clear a level to unlock the next. Search by number, range (e.g. 20-40), or status."
    });

    const actions = el("div", { class: "actions", attrs: { style: "display:flex;gap:10px;justify-content:center;flex-wrap:wrap;" } }, [
      el("button", { class: "btn ghost", text: "← Change menu", on: { click: renderCategories } })
    ]);

    board.append(nav, title, sub, hr, header, search, preview, grid, empty, hint, actions);
  }




  function startGame() {
    const chosen = buildLevelQuestions(difficulty, currentLevel);
    if (chosen.length === 0) { renderStart(); return; }
    questions = chosen.map(q => {
      const indices = shuffle(q.options.map((_, i) => i));
      return {
        ...q,
        options: indices.map(i => q.options[i]),
        answer: indices.indexOf(q.answer)
      };
    });
    currentIndex = 0;
    score = 0;
    answered = false;
    results = [];
    renderQuestion();
  }

  function renderQuestion() {
    clearBoard();
    answered = false;
    const q = questions[currentIndex];

    // Meta row: category + difficulty + score
    const meta = el("div", { class: "meta-row" });
    const cat = el("span", { class: "category-chip", text: q.category });
    const diff = el("span", { class: "category-chip diff-chip diff-" + (q.difficulty || difficulty), text: "LV " + currentLevel + " · " + (q.difficulty || difficulty).toUpperCase() });
    const scoreLine = el("span", { class: "score-line", text: `Score: ${score}` });
    meta.append(cat, diff, scoreLine);

    // Progress dots
    const dots = el("div", { class: "progress-dots" });
    for (let i = 0; i < questions.length; i++) {
      const d = el("span", { class: "dot" });
      if (i < results.length) {
        d.classList.add(results[i].correct ? "correct" : "wrong");
      } else if (i === currentIndex) {
        d.classList.add("current");
      }
      dots.appendChild(d);
    }

    const progressText = el("div", {
      class: "center",
      attrs: { style: "font-family:'Caveat',cursive;color:var(--chalk-dim);font-size:18px;margin-bottom:4px;" },
      text: `Question ${currentIndex + 1} of ${questions.length}`
    });

    // Timer bar
    const timerWrap = el("div", { class: "timer-wrap" });
    const timerBar = el("div", { class: "timer-bar" });
    const timerFill = el("div", { class: "timer-fill", attrs: { id: "timer-fill" } });
    timerBar.appendChild(timerFill);
    const timerText = el("div", { class: "timer-text" }, [
      el("span", { text: "Time left" }),
      el("span", { class: "clock", attrs: { id: "timer-clock" }, text: timerForLevel(difficulty, currentLevel) + "s" })
    ]);
    timerWrap.append(timerBar, timerText);

    const questionEl = el("div", { class: "question", text: q.question });

    const optionsWrap = el("div", { class: "options" });
    const letters = ["A", "B", "C", "D"];
    const buttons = [];
    q.options.forEach((opt, i) => {
      const btn = el("button", {
        class: "option",
        on: { click: () => handleAnswer(i, buttons, q) }
      }, [
        el("span", { class: "letter", text: letters[i] }),
        el("span", { text: opt })
      ]);
      optionsWrap.appendChild(btn);
      buttons.push(btn);
    });

    const actions = el("div", { class: "actions" });
    // Next button hidden until answered
    const nextBtn = el("button", {
      class: "btn hidden",
      text: currentIndex === questions.length - 1 ? "See Results" : "Next Question",
      attrs: { id: "next-btn" },
      on: { click: nextQuestion }
    });
    actions.appendChild(nextBtn);

    board.append(meta, progressText, timerWrap, dots, questionEl, optionsWrap, actions);
    startTimer();
  }

  function startTimer() {
    stopTimer();
    timeLeft = timerForLevel(difficulty, currentLevel);
    updateTimerUI();
    timerId = setInterval(() => {
      timeLeft -= 1;
      updateTimerUI();
      if (timeLeft <= 0) {
        stopTimer();
        handleTimeout();
      }
    }, 1000);
  }

  function stopTimer() {
    if (timerId != null) { clearInterval(timerId); timerId = null; }
  }

  function updateTimerUI() {
    const fill = document.getElementById("timer-fill");
    const clock = document.getElementById("timer-clock");
    if (!fill || !clock) return;
    const pct = Math.max(0, timeLeft) / timerForLevel(difficulty, currentLevel);
    fill.style.transform = "scaleX(" + pct + ")";
    fill.classList.toggle("warn", timeLeft <= 10 && timeLeft > 5);
    fill.classList.toggle("danger", timeLeft <= 5);
    clock.classList.toggle("danger", timeLeft <= 5);
    clock.textContent = Math.max(0, timeLeft) + "s";
  }

  function handleTimeout() {
    if (answered) return;
    answered = true;
    // Mark the current question as wrong (no selection)
    const q = questions[currentIndex];
    results.push({ correct: false, selectedIdx: null, question: q });
    playWrong();
    // End the round immediately — time ran out
    renderResults(true);
  }

  function handleAnswer(selectedIdx, buttons, q) {
    if (answered) return;
    answered = true;
    stopTimer();
    const isCorrect = selectedIdx === q.answer;
    if (isCorrect) score += 1;
    results.push({ correct: isCorrect, selectedIdx, question: q });
    if (isCorrect) playCorrect(); else playWrong();

    buttons.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.answer) btn.classList.add("correct");
      else if (i === selectedIdx) btn.classList.add("wrong");
    });

    // Fun fact
    const fact = el("div", { class: "fun-fact" }, [
      el("strong", { text: isCorrect ? "Correct! " : "Not quite. " }),
      el("span", { text: q.fact })
    ]);
    // Insert before actions
    const actions = board.querySelector(".actions");
    board.insertBefore(fact, actions);

    // Update score line
    const scoreLine = board.querySelector(".score-line");
    if (scoreLine) scoreLine.textContent = `Score: ${score}`;

    // Update current dot
    const dots = board.querySelectorAll(".dot");
    if (dots[currentIndex]) {
      dots[currentIndex].classList.remove("current");
      dots[currentIndex].classList.add(isCorrect ? "correct" : "wrong");
    }

    // Reveal next button
    const nextBtn = document.getElementById("next-btn");
    if (nextBtn) nextBtn.classList.remove("hidden");
  }

  function nextQuestion() {
    if (currentIndex < questions.length - 1) {
      currentIndex += 1;
      renderQuestion();
    } else {
      renderResults();
    }
  }

  function renderResults(timedOut) {
    clearBoard();
    const total = questions.length;
    const correct = score;
    const wrong = results.length - correct;
    const answeredCount = results.length;
    const pct = Math.round((correct / total) * 100);
    const passed = !timedOut && pct >= 60; // time-out ends the round without pass
    const isLastLevel = currentLevel >= TOTAL_LEVELS;

    // Unlock next level on pass
    let newlyUnlocked = false;
    if (passed && !isLastLevel && unlocked[difficulty] === currentLevel) {
      unlocked[difficulty] = currentLevel + 1;
      newlyUnlocked = true;
    }

    let verdict;
    if (timedOut) verdict = "⏰ Time's up! The round ended — try again to clear this level.";
    else if (pct === 100) verdict = "Perfect plate! Michelin‑star mind. ⭐";
    else if (pct >= 80) verdict = "Executive chef material — very well done!";
    else if (pct >= 60) verdict = "Solid sous‑chef performance.";
    else if (pct >= 40) verdict = "Still prepping — need 60% to clear.";
    else verdict = "Back to culinary school — need 60% to clear.";

    const title = el("h2", { class: "results-title", text: timedOut ? ("Time's Up — Level " + currentLevel) : (passed ? ("Level " + currentLevel + " Cleared!") : ("Level " + currentLevel)) });
    const big = el("div", { class: "big-score" });
    big.append(document.createTextNode(pct + "%"));
    big.appendChild(el("small", { text: ` (${correct}/${total})` }));

    const v = el("p", { class: "verdict", text: verdict });

    const stats = el("div", { class: "stat-row" }, [
      el("div", { class: "stat total" }, [
        el("span", { class: "num", text: String(total) }),
        el("span", { text: "Questions" })
      ]),
      el("div", { class: "stat correct" }, [
        el("span", { class: "num", text: String(correct) }),
        el("span", { text: "Correct" })
      ]),
      el("div", { class: "stat wrong" }, [
        el("span", { class: "num", text: String(wrong) }),
        el("span", { text: "Incorrect" })
      ])
    ]);

    // Question-by-question review
    const review = el("div", { class: "review" });
    review.appendChild(el("h3", { class: "review-title", text: "Question Review" }));
    questions.forEach((q, i) => {
      const r = results[i];
      const notReached = !r;
      const cls = notReached ? " wrong" : (r.correct ? " correct" : " wrong");
      const card = el("div", { class: "review-card" + cls });
      card.appendChild(el("div", { class: "review-q", text: (i + 1) + ". " + q.question }));
      const yourAnswerText = notReached
        ? "— (time ran out)"
        : (r.selectedIdx != null ? q.options[r.selectedIdx] : "— (no answer)");
      const selectedRow = el("div", { class: "review-row" }, [
        el("span", { class: "label", text: "Your answer:" }),
        el("span", { class: "value" + (r && r.correct ? "" : " selected"), text: yourAnswerText })
      ]);
      const correctRow = el("div", { class: "review-row correct-answer" }, [
        el("span", { class: "label", text: "Correct answer:" }),
        el("span", { class: "value", text: q.options[q.answer] })
      ]);
      card.appendChild(selectedRow);
      card.appendChild(correctRow);
      review.appendChild(card);
    });

    const actions = el("div", { class: "actions", attrs: { style: "display:flex;gap:10px;justify-content:center;flex-wrap:wrap;" } });
    if (passed && !isLastLevel) {
      actions.appendChild(el("button", {
        class: "btn",
        text: "Next Level →",
        on: { click: () => { currentLevel += 1; startGame(); } }
      }));
    }
    actions.appendChild(el("button", {
      class: "btn",
      text: passed ? "Replay Level" : "Try Again",
      on: { click: startGame }
    }));
    actions.appendChild(el("button", {
      class: "btn",
      text: "Level Select",
      on: { click: renderLevels }
    }));

    const noteText = timedOut
      ? "You had " + timerForLevel(difficulty, currentLevel) + " seconds per question — the timer beat you this time."
      : (isLastLevel && passed
        ? "You cleared every level on " + difficulty + " — chef's hat earned! 🎩"
        : (newlyUnlocked ? ("Level " + (currentLevel + 1) + " unlocked!") : "Score 60% or higher to unlock the next level."));
    const note = el("p", { class: "footer-note", text: noteText });

    board.append(title, big, v, stats, review, actions, note);
  }

  // Boot
  renderStart();
})();
</script>
